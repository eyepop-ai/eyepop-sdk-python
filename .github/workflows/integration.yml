name: Staging SDK Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: ${{ github.workflow }}-staging
  cancel-in-progress: true

jobs:
  integration:
    name: staging integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      EYEPOP_URL: ${{ vars.EYEPOP_URL }}
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Run integration tests
      env:
        EYEPOP_API_KEY: ${{ secrets.EYEPOP_API_KEY }}
        GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      run: |
        uv run pytest tests/integration/ -v -s --tb=short --timeout=300 2>&1 | tee test_output.txt
        echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat test_output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
